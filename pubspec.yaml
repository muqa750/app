name: sizeme_app
description: Sizeme luxury fashion store app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/sizeme_logo.png
    - assets/imageslogo/
    - assets/products/tshirt/
    - assets/products/polo/
    - assets/products/shirt/
    - assets/products/jeans/
    - assets/products/tracksuit/
    - assets/products/mens_accessories/
    - assets/products/accessories/
